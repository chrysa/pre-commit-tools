name: Install project
description: Install package extras (tree-sitter included via ts_unreachable_code extra)

inputs:
  extras:
    required: false
    default: 'format_dockerfile,yaml,dead_code'
    description: pip extras to install (comma-separated)

runs:
  using: composite
  steps:
    - name: Install package (${{ inputs.extras }})
      run: pip install -e '.[${{ inputs.extras }}]'
      shell: bash
