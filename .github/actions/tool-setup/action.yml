name: Tool setup
description: Python environment + project install (extras defined in setup.cfg)

inputs:
  python-version:
    required: true
    description: Python version to set up
  extras:
    required: true
    description: pip extras from setup.cfg (comma-separated, e.g. lint,format_dockerfile,yaml,dead_code)

runs:
  using: composite
  steps:
    - name: Setup Python environment
      uses: ./.github/actions/python-setup
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install project dependencies
      uses: ./.github/actions/install-project
      with:
        extras: ${{ inputs.extras }}
