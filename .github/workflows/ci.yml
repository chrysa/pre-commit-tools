true:
  pull_request:
    branches:
    - main
  push:
    branches:
    - feature/**
    - fix/**
    - main
    - release/**
jobs:
  lint:
    name: Lint & type check
    needs: version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        allow-prereleases: true
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: 'python -m pip install --upgrade pip

        pip install ruff mypy

        pip install -e ".[format_dockerfile,yaml]"

        '
    - name: ruff lint
      run: ruff check --config=config-tools/ruff.toml pre_commit_hooks
    - name: ruff format check
      run: ruff format --check --config=config-tools/ruff.toml pre_commit_hooks
    - name: mypy
      run: mypy --config-file=setup.cfg pre_commit_hooks
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.12'
        - '3.13'
        - '3.14'
  test:
    name: Test suite
    needs: version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        allow-prereleases: true
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: 'python -m pip install --upgrade pip

        pip install pytest pytest-cov vulture

        pip install -e ".[format_dockerfile,yaml]"

        '
    - name: Run tests
      run: pytest --cov=pre_commit_hooks --cov-branch --cov-report=xml:reports/coverage.xml
        -v
    - if: matrix.python-version == '3.13'
      name: Upload coverage
      uses: codecov/codecov-action@v5
      with:
        fail_ci_if_error: false
        files: reports/coverage.xml
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.12'
        - '3.13'
        - '3.14'
  version:
    name: Calculate version
    outputs:
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      semVer: ${{ steps.gitversion.outputs.semVer }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.4.2
      with:
        versionSpec: 6.7.x
    - id: gitversion
      name: Determine version
      uses: gittools/actions/gitversion/execute@v4.4.2
    - name: Display version
      run: 'echo "SemVer        : ${{ steps.gitversion.outputs.semVer }}"

        echo "FullSemVer    : ${{ steps.gitversion.outputs.fullSemVer }}"

        echo "MajorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}"

        '
name: CI
