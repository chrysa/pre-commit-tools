name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feature/**
      - fix/**
      - main
      - release/**

# Required for publish-unit-test-result-action and SonarCloud
permissions:
  checks: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  version:
    name: Calculate version
    runs-on: ubuntu-latest
    outputs:
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}
      semVer: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: 6.x
      - id: gitversion
        name: Determine version
        uses: gittools/actions/gitversion/execute@v4.4.2

  lint:
    name: Lint & type check
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.12'
          - '3.13'
          - '3.14'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -e '.[format_dockerfile,yaml]'
      - name: ruff lint
        run: ruff check --config=config-tools/ruff.toml pre_commit_hooks
      - name: ruff format check
        run: ruff format --check --config=config-tools/ruff.toml pre_commit_hooks
      - name: Produce ruff JSON report
        if: matrix.python-version == '3.13'
        run: |
          mkdir -p reports
          ruff check --config=config-tools/ruff.toml --output-format=json pre_commit_hooks > reports/ruff.json || true
      - name: Upload ruff report
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: ruff-report
          path: reports/ruff.json
      - name: mypy
        run: mypy --config-file=setup.cfg pre_commit_hooks

  test:
    name: Test suite
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.12'
          - '3.13'
          - '3.14'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov vulture
          pip install 'tree-sitter>=0.23,<0.26' 'tree-sitter-typescript>=0.23,<0.24'
          pip install -e '.[format_dockerfile,yaml,ts_unreachable_code,dead_code]'
      - name: Create reports directory
        run: mkdir -p reports
      - name: Run tests
        run: |
          pytest \
            --cov=pre_commit_hooks \
            --cov-branch \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            --junitxml=reports/junit.xml \
            -v
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.python-version }}
          path: reports/
      - name: Publish test results to PR
        if: always() && matrix.python-version == '3.13'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/junit.xml
          comment_title: Test Results
          check_name: pytest
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: reports/coverage.xml
          fail_ci_if_error: false

  sonar:
    name: SonarCloud analysis
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          allow-prereleases: true
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov vulture
          pip install 'tree-sitter>=0.23,<0.26' 'tree-sitter-typescript>=0.23,<0.24'
          pip install -e '.[format_dockerfile,yaml,ts_unreachable_code,dead_code]'
      - name: Run tests for Sonar coverage
        run: |
          mkdir -p reports
          pytest \
            --cov=pre_commit_hooks \
            --cov-branch \
            --cov-report=xml:reports/coverage.xml \
            --junitxml=reports/junit.xml \
            -v
      - name: Download ruff report
        uses: actions/download-artifact@v8
        with:
          name: ruff-report
          path: reports/
        continue-on-error: true
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        with:
          args: >
            -Dsonar.projectKey=chrysa_pre-commit-tools
            -Dsonar.organization=chrysa
            -Dsonar.projectName=pre-commit-tools
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.sources=pre_commit_hooks
            -Dsonar.tests=tests
            -Dsonar.python.version=3.14
            -Dsonar.python.coverage.reportPaths=reports/coverage.xml
            -Dsonar.python.ruff.reportPaths=reports/ruff.json
            -Dsonar.python.xunit.reportPath=reports/junit.xml
            -Dsonar.exclusions=**/__pycache__/**,**/*.egg-info/**,**/.git/**
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
