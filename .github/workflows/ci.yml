---
# Thin caller of the generalized chrysa lean CI (compose-backed app).
# Gate = pre-commit; reports -> Sonar; tests via make docker-test; sonar.
# Auto-versioning stays in release.yml (GitVersion).

name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main, "feat/**", "fix/**", "chore/**", "ci/**"]
    workflow_dispatch:

permissions:
    contents: read
    checks: write
    pull-requests: write

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        uses: chrysa/github-actions/.github/workflows/ci-python-app.yml@main
        with:
            sources: "."
            typecheck-paths: pre_commit_hooks
            project-key: chrysa_pre-commit-tools
            project-name: pre-commit-tools
            sonar-sources: "."
        secrets: inherit
