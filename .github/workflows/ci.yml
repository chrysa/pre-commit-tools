name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feature/**
      - fix/**
      - main
      - release/**
  workflow_dispatch:

# Required for publish-unit-test-result-action and SonarCloud
permissions:
  checks: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  config:
    name: Build matrix config
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ steps.matrix.outputs.python-versions }}
      latest-python: ${{ steps.matrix.outputs.latest-python }}
    steps:
      - id: matrix
        shell: bash
        run: |
          echo 'python-versions=["3.12","3.13","3.14"]' >> $GITHUB_OUTPUT
          echo 'latest-python=3.14' >> $GITHUB_OUTPUT

  ruff:
    name: Ruff (${{ matrix.python-version }})
    needs: config
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.config.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/tool-setup
        with:
          python-version: ${{ matrix.python-version }}
          extras: 'lint,format_dockerfile,yaml,dead_code'

      - name: ruff — lint check
        run: ruff check --config=config-tools/ruff.toml pre_commit_hooks tests

      - name: ruff — format check
        run: ruff format --check --config=config-tools/ruff.toml pre_commit_hooks tests

      - name: ruff — produce JSON report
        if: always() && matrix.python-version == needs.config.outputs.latest-python
        run: |
          mkdir -p reports
          ruff check --config=config-tools/ruff.toml --output-format=json pre_commit_hooks tests > reports/ruff.json || true
          echo "ruff.json size: $(wc -c < reports/ruff.json) bytes"

      - name: Upload ruff report artifact
        if: always() && matrix.python-version == needs.config.outputs.latest-python
        uses: actions/upload-artifact@v7
        with:
          name: ruff-report
          path: reports/ruff.json

  mypy:
    name: Mypy (${{ matrix.python-version }})
    needs: config
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.config.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/tool-setup
        with:
          python-version: ${{ matrix.python-version }}
          extras: 'typecheck,format_dockerfile,yaml,dead_code'

      - name: mypy — type check
        run: mypy --config-file=setup.cfg pre_commit_hooks

      - name: mypy — produce text report
        if: always() && matrix.python-version == needs.config.outputs.latest-python
        run: |
          mkdir -p reports
          mypy --config-file=setup.cfg --no-error-summary pre_commit_hooks > reports/mypy.txt 2>&1 || true
          echo "mypy.txt size: $(wc -c < reports/mypy.txt) bytes"

      - name: Upload mypy report artifact
        if: always() && matrix.python-version == needs.config.outputs.latest-python
        uses: actions/upload-artifact@v7
        with:
          name: mypy-report
          path: reports/mypy.txt

  test:
    name: Test (${{ matrix.python-version }})
    needs: config
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.config.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6

      - name: Check Node.js version
        run: node --version || echo "node not available — js-syntax-check tests will be skipped"

      - name: Setup environment
        uses: ./.github/actions/tool-setup
        with:
          python-version: ${{ matrix.python-version }}
          extras: 'test,format_dockerfile,yaml,ts_unreachable_code,dead_code'

      - name: List installed packages
        run: pip list --format=columns | grep -E "tree.sitter|vulture|pytest|dockerfile"

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run test suite
        run: |
          pytest \
            --cov=pre_commit_hooks \
            --cov-branch \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            --junitxml=reports/junit.xml \
            -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.python-version }}
          path: reports/

      - name: Publish test results to PR
        if: always() && matrix.python-version == needs.config.outputs.latest-python
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/junit.xml
          comment_title: Test Results
          check_name: pytest

      - name: Upload coverage to Codecov
        if: matrix.python-version == needs.config.outputs.latest-python
        uses: codecov/codecov-action@v6
        with:
          files: reports/coverage.xml
          fail_ci_if_error: false

  sonar:
    name: SonarCloud analysis
    needs: [config, ruff, mypy, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download test results (${{ needs.config.outputs.latest-python }})
        uses: actions/download-artifact@v8
        with:
          name: test-results-${{ needs.config.outputs.latest-python }}
          path: reports/
        continue-on-error: true

      - name: Download ruff report
        uses: actions/download-artifact@v8
        with:
          name: ruff-report
          path: reports/
        continue-on-error: true

      - name: Download mypy report
        uses: actions/download-artifact@v8
        with:
          name: mypy-report
          path: reports/
        continue-on-error: true

      - name: List reports available for SonarCloud
        run: ls -lh reports/ || echo "reports/ directory is empty or missing"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.projectKey=chrysa_pre-commit-tools
            -Dsonar.organization=chrysa
            -Dsonar.projectName=pre-commit-tools
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.sources=pre_commit_hooks
            -Dsonar.tests=tests
            -Dsonar.python.version=${{ needs.config.outputs.latest-python }}
            -Dsonar.python.coverage.reportPaths=reports/coverage.xml
            -Dsonar.python.ruff.reportPaths=reports/ruff.json
            -Dsonar.python.mypy.reportPaths=reports/mypy.txt
            -Dsonar.python.xunit.reportPath=reports/junit.xml
            -Dsonar.exclusions=**/__pycache__/**,**/*.egg-info/**,**/.git/**
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


