name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feature/**
      - fix/**
      - main
      - release/**
  workflow_dispatch:

# Required for publish-unit-test-result-action and SonarCloud
permissions:
  checks: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  lint:
    name: Lint (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.12'
          - '3.13'
          - '3.14'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check Python version
        run: python --version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Check ruff version
        run: ruff --version

      - name: Check mypy version
        run: mypy --version

      - name: Install package (core extras)
        run: pip install -e '.[format_dockerfile,yaml,dead_code]'

      - name: Install tree-sitter
        run: pip install 'tree-sitter>=0.23,<0.26' 'tree-sitter-typescript>=0.23,<0.24'

      - name: ruff — lint check
        run: ruff check --config=config-tools/ruff.toml pre_commit_hooks tests

      - name: ruff — format check
        run: ruff format --check --config=config-tools/ruff.toml pre_commit_hooks tests

      - name: ruff — produce JSON report
        if: matrix.python-version == '3.13'
        run: |
          mkdir -p reports
          ruff check --config=config-tools/ruff.toml --output-format=json pre_commit_hooks tests > reports/ruff.json || true
          echo "ruff.json size: $(wc -c < reports/ruff.json) bytes"

      - name: Upload ruff report artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: ruff-report
          path: reports/ruff.json

      - name: mypy — type check
        run: mypy --config-file=setup.cfg pre_commit_hooks

  test:
    name: Test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.12'
          - '3.13'
          - '3.14'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check Python version
        run: python --version

      - name: Check Node.js version
        run: node --version || echo "node not available — js-syntax-check tests will be skipped"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test tools
        run: pip install pytest pytest-cov

      - name: Check pytest version
        run: pytest --version

      - name: Install vulture (dead code)
        run: pip install vulture

      - name: Install tree-sitter
        run: pip install 'tree-sitter>=0.23,<0.26' 'tree-sitter-typescript>=0.23,<0.24'

      - name: Install package (all extras)
        run: pip install -e '.[format_dockerfile,yaml,ts_unreachable_code,dead_code]'

      - name: List installed packages
        run: pip list --format=columns | grep -E "tree.sitter|vulture|pytest|dockerfile"

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run test suite
        run: |
          pytest \
            --cov=pre_commit_hooks \
            --cov-branch \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            --junitxml=reports/junit.xml \
            -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.python-version }}
          path: reports/

      - name: Publish test results to PR
        if: always() && matrix.python-version == '3.13'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/junit.xml
          comment_title: Test Results
          check_name: pytest

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: reports/coverage.xml
          fail_ci_if_error: false

  sonar:
    name: SonarCloud analysis
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download test results (3.13)
        uses: actions/download-artifact@v8
        with:
          name: test-results-3.13
          path: reports/

      - name: Download ruff report
        uses: actions/download-artifact@v8
        with:
          name: ruff-report
          path: reports/
        continue-on-error: true

      - name: List reports available for SonarCloud
        run: ls -lh reports/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        with:
          args: >
            -Dsonar.projectKey=chrysa_pre-commit-tools
            -Dsonar.organization=chrysa
            -Dsonar.projectName=pre-commit-tools
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.sources=pre_commit_hooks
            -Dsonar.tests=tests
            -Dsonar.python.version=3.14
            -Dsonar.python.coverage.reportPaths=reports/coverage.xml
            -Dsonar.python.ruff.reportPaths=reports/ruff.json
            -Dsonar.python.xunit.reportPath=reports/junit.xml
            -Dsonar.exclusions=**/__pycache__/**,**/*.egg-info/**,**/.git/**
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

