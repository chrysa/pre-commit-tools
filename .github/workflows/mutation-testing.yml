---
name: Mutation Testing

on:
    schedule:
        - cron: "0 3 * * 1"
    workflow_dispatch:
        inputs:
            paths:
                description: "Comma-separated paths to mutate (default: pre_commit_hooks)"
                required: false
                default: "pre_commit_hooks"
            threshold:
                description: "Minimum mutation score (0–100)"
                required: false
                default: "70"

env:
    MUTATION_PATHS: ${{ github.event.inputs.paths || 'pre_commit_hooks' }}
    MUTATION_THRESHOLD: ${{ github.event.inputs.threshold || '70' }}

permissions:
    contents: read

jobs:
    mutation:
        name: Mutmut
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v6

            - uses: chrysa/github-actions/tool-setup@v1
              with:
                  python-version: "3.14"
                  extras: dev

            - run: pip install mutmut

            - name: Run mutmut
              run: |
                  mutmut run \
                    --paths-to-mutate "${{ env.MUTATION_PATHS }}" \
                    --runner "python -m pytest tests/ -x -q --no-header" \
                    --no-progress \
                    || true

            - name: Check mutation score
              run: |
                  KILLED=$(mutmut results 2>/dev/null | grep -c "^Killed" || echo 0)
                  SURVIVED=$(mutmut results 2>/dev/null | grep -c "^Survived" || echo 0)
                  TOTAL=$((KILLED + SURVIVED))
                  SCORE=$([ "$TOTAL" -eq 0 ] && echo 100 || echo $((KILLED * 100 / TOTAL)))
                  mutmut results || true
                  echo "Mutation score: ${SCORE}% (threshold: ${{ env.MUTATION_THRESHOLD }}%)"
                  [ "$SCORE" -ge "${{ env.MUTATION_THRESHOLD }}" ] || exit 1

            - uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: mutmut-results
                  path: .mutmut-cache
                  retention-days: 7
