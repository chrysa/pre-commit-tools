---
name: Mutation Testing

on:
    schedule:
        - cron: '0 3 * * 1'
    workflow_dispatch:
        inputs:
            paths:
                description: 'Comma-separated paths to mutate'
                required: false
                default: 'chrysa_hooks/'
            threshold:
                description: 'Minimum mutation score (0-100)'
                required: false
                default: '70'

jobs:
    call:
        uses: chrysa/github-actions/.github/workflows/mutation-testing.yml@main
        secrets: inherit
        with:
            paths: ${{ inputs.paths || 'chrysa_hooks/' }}
            threshold: ${{ inputs.threshold || '70' }}
