true:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - uses: pre-commit/action@v3.0.1
name: pre-commit
