true:
  push:
    branches:
    - main
  workflow_dispatch: null
jobs:
  build:
    name: Build distribution
    needs: version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Update version in setup.cfg
      run: 'sed -i "s/^version = .*/version = ${{ needs.version.outputs.majorMinorPatch
        }}/" setup.cfg

        '
    - name: Install build
      run: pip install build
    - name: Build package
      run: python -m build
    - uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/
  publish:
    environment: pypi
    if: needs.version.outputs.preReleaseTag == ''
    name: Publish to PyPI
    needs:
    - build
    - version
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/
    - uses: pypa/gh-action-pypi-publish@release/v1
  version:
    name: Calculate version
    outputs:
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      preReleaseTag: ${{ steps.gitversion.outputs.preReleaseTag }}
      semVer: ${{ steps.gitversion.outputs.semVer }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.4.2
      with:
        versionSpec: 6.7.x
    - id: gitversion
      name: Determine version
      uses: gittools/actions/gitversion/execute@v4.4.2
name: Publish to PyPI
