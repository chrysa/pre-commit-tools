default_language_version:
  python: python3.14
fail_fast: false
minimum_pre_commit_version: 4.1.0
repos:
- hooks:
  - id: setup-cfg-fmt
  repo: https://github.com/asottile/setup-cfg-fmt
  rev: 051b55b8a03053b7d7b24b5e54a86fcccbe2a6bd
- hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - args:
    - --allow-multiple-documents
    exclude: ^\.github/ISSUE_TEMPLATE/
    id: check-yaml
  - id: debug-statements
  repo: https://github.com/pre-commit/pre-commit-hooks
  rev: b89c5eef3ba3a74ecd506d968e63a8b80f697abf
- hooks:
  - id: add-trailing-comma
  repo: https://github.com/asottile/add-trailing-comma
  rev: b5695900a5bcefcdb712917a33baed945269d201
- hooks:
  - args:
    - --in-place
    - github
    - --header-levels
    - '6'
    id: md-toc
    stages:
    - manual
  repo: https://github.com/frnmst/md-toc
  rev: 9.0.0
- hooks:
  - args:
    - --fix
    id: markdownlint
    stages:
    - manual
  repo: https://github.com/igorshubovych/markdownlint-cli
  rev: cfc833bfc00c7cc40f702bd9e02df34d850d0291
- hooks:
  - additional_dependencies:
    - mdformat-gfm
    id: mdformat
    stages:
    - manual
  repo: https://github.com/executablebooks/mdformat
  rev: 56b24ef0c6cfdab501844925971204f858185547
- hooks:
  - args:
    - --indent-size
    - '4'
    id: beautysh
  repo: https://github.com/lovesegfault/beautysh
  rev: 34c3b3da0233e76d7d1ad90a78f3679185ecf31c
- hooks:
  - args:
    - --ignore=E006
    - E020
    id: bashate
  repo: https://github.com/openstack/bashate
  rev: ec2f2400915200d633299612a02d7d285e4be24c
- hooks:
  - args:
    - pre_commit_hooks/
    id: vulture
    stages:
    - manual
  repo: https://github.com/jendrikseipp/vulture
  rev: 51a13e9467e3dea6ea5ddb74422a0eba87367ef5
- hooks:
  - args:
    - --config=config-tools/ruff.toml
    - --fix
    id: ruff-check
  - args:
    - --config=config-tools/ruff.toml
    id: ruff-format
  repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.11
- hooks:
  - args:
    - --rcfile=setup.cfg
    - --reports=no
    - --persistent=no
    - --score=no
    - --disable=E0401
    id: pylint
    stages:
    - manual
  repo: https://github.com/pre-commit/mirrors-pylint
  rev: a1b176a5ee919967cf01e87c0222bd64b94fe0de
- hooks:
  - args:
    - --config-file=setup.cfg
    id: mypy
    stages:
    - manual
  repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.20.1
- hooks:
  - id: python-no-eval
  - exclude: ^(pre_commit_hooks/no_console_warn\.py|tests/test_js_hooks_new\.py)$
    id: python-no-log-warn
  - id: python-use-type-annotations
  - id: rst-backticks
  repo: https://github.com/pre-commit/pygrep-hooks
  rev: be31e1cd4d91a091b6710bcafd9e79dafff86703
- hooks:
  - id: auto-walrus
  repo: https://github.com/MarcoGorelli/auto-walrus
  rev: 7353fddb82fd30f1794e618a300333f41c3a2ef3
- hooks:
  - id: rm-unneeded-f-str
  repo: https://github.com/dannysepler/rm_unneeded_f_str
  rev: df396a8bfdeced1a011c7d9d6787aa7f49ac8634
- hooks:
  - id: pip-audit
  repo: https://github.com/pypa/pip-audit
  rev: cce839c779f52608554d39415464839cdbaa516e
- hooks:
  - args:
    - --baseline
    - .secrets.baseline
    exclude: \.pre-commit-config\.yaml
    id: detect-secrets
  repo: https://github.com/Yelp/detect-secrets
  rev: 5e141933554a0b74e7341841f318be21e895339c
- hooks:
  - args:
    - --py3-only
    - --py312-plus
    id: pyupgrade
    stages:
    - manual
  repo: https://github.com/asottile/pyupgrade
  rev: f201dbc8ebd88c571c04b2287520727ba3d0614b
- hooks:
  - entry: print-detection
    id: python-print-detection
    language: python
    name: detect print on python code
    types:
    - python
  - entry: pprint-detection
    id: python-pprint-detection
    language: python
    name: detect pprint on python code
    types:
    - python
  - entry: debugger-detection
    id: debugger-detection
    language: python
    name: detect debugger statements
  - additional_dependencies:
    - PyYAML
    entry: yaml-sorter
    exclude: ^\.github/
    id: yaml-sorter
    language: python
    name: sort yaml files
    types:
    - yaml
  - entry: json-sorter
    id: json-sorter
    language: python
    name: sort json files
    types:
    - json
  - entry: requirements-sort
    files: requirements.*\.txt$
    id: requirements-sort
    language: python
    name: sort requirements files
    types:
    - text
  - entry: env-file-check
    files: \.env
    id: env-file-check
    language: python
    name: check env files for secrets
    types:
    - text
  - entry: logger-detection
    id: python-logger-detection
    language: python
    name: detect root logger usage
    types:
    - python
  - entry: unreachable-code-detection
    id: python-unreachable-code
    language: python
    name: detect unreachable code
    types:
    - python
  - additional_dependencies:
    - vulture>=2.0
    entry: dead-code-detection
    id: python-dead-code
    language: python
    name: detect dead/unused code
    stages:
    - manual
    types:
    - python
  repo: local
