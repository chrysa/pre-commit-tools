---
default_language_version:
  python: python3.14
fail_fast: false
minimum_pre_commit_version: 4.1.0
repos:
  - repo: https://github.com/asottile/setup-cfg-fmt
    rev: v3.2.0
    hooks:
      - id: setup-cfg-fmt

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: debug-statements

  - repo: https://github.com/asottile/reorder-python-imports
    rev: 10322d36ca8efbf9e1e847f3aa76cf9aec25f41d
    hooks:
      - id: reorder-python-imports
        args: [--py310-plus]

  - repo: https://github.com/asottile/add-trailing-comma
    rev: 756490e3dd6602fbb18d5ad51deb43c4e21de0a0
    hooks:
      - id: add-trailing-comma

  - repo: https://github.com/frnmst/md-toc
    rev: 9.0.0
    hooks:
      - id: md-toc
        args: [--in-place, github, --header-levels, '6']
        stages: [manual]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: f7ed74202ac8ec26bab4a68359556c5243df142f
    hooks:
      - id: markdownlint
        args: [--fix]
        stages: [manual]

  - repo: https://github.com/executablebooks/mdformat
    rev: 56b24ef0c6cfdab501844925971204f858185547
    hooks:
      - id: mdformat
        additional_dependencies: [mdformat-gfm]
        stages: [manual]

  - repo: https://github.com/lovesegfault/beautysh
    rev: 34c3b3da0233e76d7d1ad90a78f3679185ecf31c
    hooks:
      - id: beautysh
        args: [--indent-size, '4']

  - repo: https://github.com/openstack/bashate
    rev: ec2f2400915200d633299612a02d7d285e4be24c
    hooks:
      - id: bashate
        args: [--ignore=E006,E020]

  - repo: https://github.com/jendrikseipp/vulture
    rev: 51a13e9467e3dea6ea5ddb74422a0eba87367ef5
    hooks:
      - id: vulture
        args: [pre_commit_hooks/]
        stages: [manual]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--config=config-tools/ruff.toml, --fix]
      - id: ruff-format
        args: [--config=config-tools/ruff.toml]

  - repo: https://github.com/pre-commit/mirrors-pylint
    rev: a1b176a5ee919967cf01e87c0222bd64b94fe0de
    hooks:
      - id: pylint
        args:
          - --rcfile=setup.cfg
          - --reports=no
          - --persistent=no
          - --score=no
          - --disable=E0401
        stages: [manual]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: [--config-file=setup.cfg]
        stages: [manual]

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: 84aa5ebaf906144146cbc33c5e71b364cda3d719
    hooks:
      - id: python-no-eval
      - id: python-no-log-warn
      - id: python-use-type-annotations
      - id: rst-backticks

  - repo: https://github.com/MarcoGorelli/auto-walrus
    rev: a5b68c175abc5d75c9279f42ac6c49a8d536d985
    hooks:
      - id: auto-walrus

  - repo: https://github.com/dannysepler/rm_unneeded_f_str
    rev: df396a8bfdeced1a011c7d9d6787aa7f49ac8634
    hooks:
      - id: rm-unneeded-f-str

  - repo: https://github.com/pypa/pip-audit
    rev: e04691292eda1515277abe8a98ae440f2e5b19df
    hooks:
      - id: pip-audit

  - repo: https://github.com/Yelp/detect-secrets
    rev: 50119d658ab48021cad234fc5c8d3253263b2ec0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: \.pre-commit-config\.yaml

  - repo: https://github.com/asottile/pyupgrade
    rev: 369aea6489e38ca74a18df494f191857ba484950
    hooks:
      - id: pyupgrade
        args: [--py3-only, --py310-plus]
        stages: [manual]

  - repo: local
    hooks:
      - id: python-print-detection
        name: detect print on python code
        entry: print-detection
        language: python
        types: [python]
      - id: python-pprint-detection
        name: detect pprint on python code
        entry: pprint-detection
        language: python
        types: [python]
      - id: debugger-detection
        name: detect debugger statements
        entry: debugger-detection
        language: python
      - id: yaml-sorter
        name: sort yaml files
        entry: yaml-sorter
        language: python
        types: [yaml]
        additional_dependencies: [PyYAML]
      - id: json-sorter
        name: sort json files
        entry: json-sorter
        language: python
        types: [json]
      - id: requirements-sort
        name: sort requirements files
        entry: requirements-sort
        language: python
        types: [text]
        files: requirements.*\.txt$
      - id: env-file-check
        name: check env files for secrets
        entry: env-file-check
        language: python
        types: [text]
        files: \.env
      - id: python-logger-detection
        name: detect root logger usage
        entry: logger-detection
        language: python
        types: [python]
      - id: python-unreachable-code
        name: detect unreachable code
        entry: unreachable-code-detection
        language: python
        types: [python]
      - id: python-dead-code
        name: detect dead/unused code
        entry: dead-code-detection
        language: python
        types: [python]
        additional_dependencies: [vulture>=2.0]
        stages: [manual]
