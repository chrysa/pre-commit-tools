  description: format dockerfiles
  entry: format-dockerfile
  files: Dockerfile, .[dD]ockerfile$
  language: python
  language_version: '3.12'
  minimum_pre_commit_version: '3.7.1'
  name: format dockerfiles
  types: ["dockerfile"]
