  entry: ts-unreachable-code-detection
  files: \.(ts|tsx|js|jsx)$
  language: python
  language_version: '3.12'
  minimum_pre_commit_version: '2.20.0'
  name: detect unreachable code in TypeScript/JSX
  types_or: ["ts", "tsx", "javascript", "file"]
