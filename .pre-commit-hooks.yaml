- id: python-dead-code
  additional_dependencies:
    - vulture>=2.0
  args: ['--min-confidence=80']
  description: detect unused/dead code (functions, variables, imports) using vulture
  entry: dead-code-detection
  language: python
  language_version: '3.12'
  minimum_pre_commit_version: '2.20.0'
  name: detect dead/unused code
  pass_filenames: true
  stages: [manual]
  types: ["python"]
- id: ts-unreachable-code
  additional_dependencies:
