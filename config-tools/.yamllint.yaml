---
# yamllint configuration
# https://yamllint.readthedocs.io/
# Reference: args: [-c, config-tools/.yamllint.yaml]

rules:
    braces:
        level: error
        max-spaces-inside: 1
        max-spaces-inside-empty: 0
    brackets:
        level: error
        max-spaces-inside: 1
        max-spaces-inside-empty: 0
    colons:
        level: error
        max-spaces-after: 1
        max-spaces-before: 0
    commas:
        level: error
        max-spaces-after: 1
        max-spaces-before: 0
    comments:
        level: warning
        min-spaces-from-content: 2
    comments-indentation: disable
    document-end: disable
    document-start: disable
    empty-lines:
        level: error
        max: 2
        max-end: 1
        max-start: 0
    empty-values: disable
    float-values: disable
    hyphens:
        level: error
        max-spaces-after: 1
    indentation:
        level: error
        spaces: 4
    key-duplicates: disable
    key-ordering: disable
    line-length:
        level: warning
        max: 120
    new-line-at-end-of-file: disable
    octal-values: disable
    quoted-strings: disable
    trailing-spaces: disable
    truthy:
        level: warning
