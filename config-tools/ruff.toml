line-length = 120
target-version = "py312"

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes (includes F401 unused imports)
    "W",    # pycodestyle warnings
    "C90",  # mccabe complexity
    "B",    # flake8-bugbear
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade  — replaces asottile/pyupgrade hook
    "TID",  # flake8-tidy-imports
    "S",    # flake8-bandit (security) — replaces PyCQA/bandit hook
    "FURB", # refurb (modernise Python idioms)
    "RUF",  # ruff-specific rules
]
ignore = [
    "E203",   # whitespace before ':' (conflicts with black-style formatting)
    "S101",   # assert used (fine in tests)
    "S603",   # subprocess call: check=False (too noisy for hook scripts)
    "S607",   # starting a process with a partial executable path
]

[lint.mccabe]
max-complexity = 15

[lint.flake8-tidy-imports]
ban-relative-imports = "all"

[lint.isort]
split-on-trailing-comma = true

[lint.per-file-ignores]
"tests/**" = ["S101", "N802", "S603", "S607"]
"pre_commit_hooks/pylint_report_html.py" = ["S101"]

[format]
quote-style = "single"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true
skip-magic-trailing-comma = false
