sonar.projectKey=chrysa_pre-commit-tools
sonar.organization=chrysa
sonar.projectName=pre-commit-tools
sonar.projectVersion=1.0

# Source encoding
sonar.sourceEncoding=UTF-8

# Source directories
sonar.sources=pre_commit_hooks
sonar.tests=tests

# Python version
sonar.python.version=3.14

# Coverage reports
sonar.python.coverage.reportPaths=reports/coverage.xml

# Ruff / external issues
sonar.python.ruff.reportPaths=reports/ruff.json

# Test reports (JUnit XML)
sonar.python.xunit.reportPath=reports/junit.xml

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.egg-info/**,**/.git/**

# Quality gate — enforce on main and PRs
sonar.qualitygate.wait=true
