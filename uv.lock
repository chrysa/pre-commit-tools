requires-dist = [
    { name = "dockerfile-parse", marker = "extra == 'format-dockerfile'", specifier = "==2.0.1" },
    { name = "mypy", marker = "extra == 'typecheck'" },
    { name = "pylint", marker = "extra == 'pylint-report'", specifier = "==4.0.5" },
    { name = "pylint-report", marker = "extra == 'pylint-report'", specifier = "==2.4.2" },
    { name = "pytest", marker = "extra == 'test'" },
    { name = "pytest-cov", marker = "extra == 'test'" },
    { name = "pyyaml", marker = "extra == 'yaml'", specifier = "==6.0.3" },
    { name = "ruff", marker = "extra == 'lint'" },
    { name = "tree-sitter", marker = "extra == 'ts-unreachable-code'", specifier = ">=0.23,<0.26" },
    { name = "tree-sitter-typescript", marker = "extra == 'ts-unreachable-code'", specifier = ">=0.23,<0.24" },
    { name = "types-pyyaml", marker = "extra == 'typecheck'" },
    { name = "vulture", marker = "extra == 'dead-code'", specifier = ">=2.0" },
]
provides-extras = ["dead-code", "format-dockerfile", "lint", "pylint-report", "test", "ts-unreachable-code", "typecheck", "yaml"]

